name: lettalk
description: "Lettalk — People Are The Network. Offline-first Bluetooth LE mesh messaging."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.4.9

  # Local database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

  # Bluetooth LE mesh transport — central role (scan/connect/GATT client)
  flutter_blue_plus: ^1.31.15
  # Bluetooth LE — peripheral role (advertise + GATT server), since
  # flutter_blue_plus does not support peripheral mode
  bluetooth_low_energy: ^6.2.1

  # Cryptography: X25519 key exchange + AES-256-GCM
  cryptography: ^2.7.0
  crypto: ^3.0.3

  # Background relay service
  flutter_background_service: ^5.0.5

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Permissions (BLE, notifications)
  permission_handler: ^11.1.0
  app_settings: ^7.0.0

  # IDs / UUIDs for Lettalk ID + message IDs
  uuid: ^4.2.2

  # QR code generation + scanning (Lettalk ID sharing)
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0

  # Secure local key storage (wraps private key encryption)
  flutter_secure_storage: ^9.0.0

  # Charts (Network Strength last 1 hour graph)
  fl_chart: ^0.66.0

  # Date / time formatting
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
