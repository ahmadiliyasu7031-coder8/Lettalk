name: lettalk
description: "Lettalk — People Are The Network. Offline-first Bluetooth LE mesh messaging."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  flutter_riverpod: ^2.4.9

  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

  flutter_blue_plus: ^1.31.15
  bluetooth_low_energy: ^6.2.1

  cryptography: ^2.7.0
  crypto: ^3.0.3

  flutter_background_service: ^5.0.5

  flutter_local_notifications: ^18.0.1

  permission_handler: ^11.1.0

  uuid: ^4.2.2

  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0

  flutter_secure_storage: ^9.0.0

  fl_chart: ^0.66.0

  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
