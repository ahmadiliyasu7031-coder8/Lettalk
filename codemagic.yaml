workflows:
  lettalk-android-release:
    name: Lettalk - Android Release APK
    max_build_duration: 30
    instance_type: mac_mini_m2 # free tier minutes (500/month on personal accounts) only apply to this machine type — linux_x2 requires billing enabled, even though this app only targets Android
    environment:
      flutter: stable
      # No signing setup needed for this first build — Flutter's default
      # generated project signs "release" builds with the debug keystore
      # unless you configure a real one, which is fine for installing on
      # your own phone to test. Only add a real keystore + signing group
      # here once you're ready to publish to the Play Store.
    scripts:
      - name: Scaffold missing Android platform files (gradle, MainActivity, etc.)
        script: |
          # The source tree as delivered intentionally ships only a hand-written
          # AndroidManifest.xml — everything else under android/ (Gradle files,
          # MainActivity, gradle wrapper) needs to come from the Flutter SDK
          # actually running on this build machine, not hand-typed offline.
          cp android/app/src/main/AndroidManifest.xml /tmp/LettalkManifest.xml
          flutter create --platforms=android --org com.ahmerdee --project-name lettalk .
          cp /tmp/LettalkManifest.xml android/app/src/main/AndroidManifest.xml

          # flutter_local_notifications 18.x requires core library desugaring
          # to be enabled in the app's own Gradle file (it's not something
          # the plugin can enable on your behalf). Appending a second
          # android{}/dependencies{} block is valid Gradle and merges with
          # the generated one, so this works without needing to find/edit
          # a specific line inside the generated file.
          if [ -f android/app/build.gradle.kts ]; then
          cat >> android/app/build.gradle.kts << 'EOF'
          android {
          defaultConfig {
          minSdk = 23
          }
          compileOptions {
          isCoreLibraryDesugaringEnabled = true
          sourceCompatibility = JavaVersion.VERSION_17
          targetCompatibility = JavaVersion.VERSION_17
          }
          }
          dependencies {
          coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
          }
          EOF
          elif [ -f android/app/build.gradle ]; then
          cat >> android/app/build.gradle << 'EOF'
          android {
          defaultConfig {
          minSdkVersion 23
          }
          compileOptions {
          coreLibraryDesugaringEnabled true
          sourceCompatibility JavaVersion.VERSION_17
          targetCompatibility JavaVersion.VERSION_17
          }
          }
          dependencies {
          coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
          }
          EOF
          fi

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build release APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - you@example.com # replace with your email to get notified + the APK link
        notify:
          success: true
          failure: true
