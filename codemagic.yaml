workflows:
  lettalk-android-release:
    name: Lettalk - Android Release APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Scaffold missing Android platform files (gradle, MainActivity, etc.)
        script: |
          cp android/app/src/main/AndroidManifest.xml /tmp/LettalkManifest.xml
          flutter create --platforms=android --org com.ahmerdee --project-name lettalk .
          cp /tmp/LettalkManifest.xml android/app/src/main/AndroidManifest.xml

          if [ -f android/app/build.gradle.kts ]; then
          cat >> android/app/build.gradle.kts << 'EOF'
          android {
          compileOptions {
          isCoreLibraryDesugaringEnabled = true
          sourceCompatibility = JavaVersion.VERSION_17
          targetCompatibility = JavaVersion.VERSION_17
          }
          }
          dependencies {
          coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
          }
          EOF
          elif [ -f android/app/build.gradle ]; then
          cat >> android/app/build.gradle << 'EOF'
          android {
          compileOptions {
          coreLibraryDesugaringEnabled true
          sourceCompatibility JavaVersion.VERSION_17
          targetCompatibility JavaVersion.VERSION_17
          }
          }
          dependencies {
          coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
          }
          EOF
          fi

          if [ -f android/build.gradle.kts ]; then
          cat >> android/build.gradle.kts << 'EOF'
          subprojects {
          extensions.findByName("android")?.let { ext ->
          if (ext is com.android.build.gradle.BaseExtension) {
          ext.compileSdkVersion(36)
          }
          }
          }
          EOF
          elif [ -f android/build.gradle ]; then
          cat >> android/build.gradle << 'EOF'
          subprojects { proj ->
          if (proj.hasProperty('android')) {
          proj.android {
          compileSdkVersion 36
          }
          }
          }
          EOF
          fi

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build release APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - you@example.com
        notify:
          success: true
          failure: true
